services:
  postgres:
    image: postgres:16-alpine
    container_name: convofy-team-chat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: teamflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: a036ceb12a527f429fc174c480b3b07d
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d teamflow"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
